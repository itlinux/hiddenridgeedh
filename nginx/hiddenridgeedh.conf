server {
    listen 80;
    server_name hiddenridgeedh.com www.hiddenridgeedh.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name hiddenridgeedh.com www.hiddenridgeedh.com;

    ssl_certificate     /etc/letsencrypt/live/hiddenridgeedh.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hiddenridgeedh.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;

    client_max_body_size 20M;

    # Next.js frontend
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # FastAPI backend
    location /api/ {
        proxy_pass http://127.0.0.1:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploaded images (served directly by nginx for performance)
    location /uploads/ {
        alias /var/www/hiddenridgeedh/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff;
    }
}
