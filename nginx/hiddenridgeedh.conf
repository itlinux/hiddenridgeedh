# ── Rate-limit zones (placed in http context via include, or paste into nginx.conf http{})
# If nginx complains these must be in http{}, move them to /etc/nginx/conf.d/rate-limit.conf
# limit_req_zone $binary_remote_addr zone=api_general:10m rate=10r/s;
# limit_req_zone $binary_remote_addr zone=api_auth:10m rate=3r/s;

server {
    listen 80;
    server_name hiddenridgeedh.com www.hiddenridgeedh.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name hiddenridgeedh.com www.hiddenridgeedh.com;

    ssl_certificate     /etc/letsencrypt/live/hiddenridgeedh.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hiddenridgeedh.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;

    client_max_body_size 20M;

    # ── Security Headers ──────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://challenges.cloudflare.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.tile.openstreetmap.org https://unpkg.com; frame-src https://challenges.cloudflare.com; connect-src 'self' https://challenges.cloudflare.com;" always;

    # ── Block hidden files (.env, .git, .htaccess, etc.) ──────────
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Block common attack paths (WordPress, PHP, etc.) ──────────
    location ~* ^/(wp-admin|wp-login|wp-content|wp-includes|xmlrpc\.php|admin\.php|phpmyadmin|pma|myadmin|mysql|cgi-bin|\.aws|\.docker|\.kube|composer\.(json|lock)|package\.json|node_modules|vendor|\.vscode|\.idea) {
        deny all;
        return 404;
    }

    # ── Block suspicious file extensions ──────────────────────────
    location ~* \.(php|asp|aspx|jsp|cgi|pl|py|sh|bash|exe|dll|bat|cmd)$ {
        deny all;
        return 404;
    }

    # ── Block bad bots / scanners by User-Agent ───────────────────
    if ($http_user_agent ~* (sqlmap|nikto|nmap|masscan|ZmEu|dirbuster|gobuster|wfuzz|nuclei|httpx-toolkit|censys|shodan|NetcraftSurveyAgent|zgrab)) {
        return 403;
    }

    # ── Block empty User-Agent (most bots don't set one) ──────────
    if ($http_user_agent = "") {
        return 403;
    }

    # ── Next.js frontend ──────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── FastAPI backend ───────────────────────────────────────────
    location /api/ {
        # Optional: uncomment if rate-limit zones are defined in http{}
        # limit_req zone=api_general burst=20 nodelay;

        proxy_pass http://127.0.0.1:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Auth endpoints (stricter rate limit) ──────────────────────
    location /api/auth/ {
        # Optional: uncomment if rate-limit zones are defined in http{}
        # limit_req zone=api_auth burst=5 nodelay;

        proxy_pass http://127.0.0.1:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Uploaded images (served directly by nginx) ────────────────
    location /uploads/ {
        alias /var/www/hiddenridgeedh/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;

        # Only allow image files
        location ~* \.(?!jpg|jpeg|png|gif|webp|svg|ico) {
            deny all;
            return 403;
        }
    }

    # ── Favicon / robots.txt (prevent 404 noise in logs) ──────────
    location = /robots.txt {
        add_header Content-Type text/plain;
        return 200 "User-agent: *\nDisallow: /api/\nDisallow: /admin/\nDisallow: /edh/\n";
    }

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}
